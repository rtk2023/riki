<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="modal.css">
    <link rel="stylesheet" href="style.css">
    <title>F1 Drivers Championship Calculator</title>
</head>

<body onload="setup()">
    <!-- Header -->
    <header class="py-3 bg-white shadow-sm mb-3">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="#" class="d-flex align-items-center text-decoration-none text-dark">
                <span style="font-weight:600;font-size:18px;">F1 Rezultātu Kalkulators</span>
            </a>
            <nav class="d-none d-md-flex gap-3">
                <a href="#" class="text-decoration-none text-dark">Sākums</a>
                <a href="#calculator" class="text-decoration-none text-dark">Kalkulators</a>
                <a href="https://rtk2023.github.io/riki/" class="text-decoration-none text-dark">Rīki</a>
                <a href="https://github.com/rtk2023/riki" target="_blank" rel="noopener"
                    class="text-decoration-none">GitHub</a>
            </nav>
        </div>
    </header>
    <!--SACENSĪBU TABULA-->
    <div class="container">
        <table id="racesTable" class="table table-striped text-center">
            <thead>
                <tr>
                    <th>Flag</th>
                    <th>Country</th>
                    <th>Race Title</th>
                    <th>Winner</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="racesTableBody"></tbody>
        </table>
        <button class="btn btn-secondary" id="btnCurrent" onclick="resetRaces()">Current Standings</button>
        <button class="btn btn-primary" id="btnOriginal" onclick="showPointsTable()">Calculated Standings</button>
    </div>
    <!--PUNKTU TABULA-->
    <div class="container">
        <table id="pointsTable" class="table table-striped text-center">
            <thead>
                <tr>
                    <th>Position</th>
                    <th>Racer</th>
                    <th>Acronym</th>
                    <th>Name</th>
                    <th>Team</th>
                    <th>Number</th>
                    <th>Points</th>
                </tr>
            </thead>
            <tbody id="pointsTableBody"></tbody>
        </table>
    </div>
    <script src="modal.js?v=2"></script>
    <script src="script.js?v=2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
