<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="modal.css">
    <link rel="stylesheet" href="style.css">
    <title>F1 Braucēju Čempionāta Kalkulators</title>
</head>

<body onload="setup()">
    <main>
    <!-- Header -->
    <header class="py-3 bg-white shadow-sm mb-3">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="#" class="d-flex align-items-center text-decoration-none text-dark">
                <span style="font-weight:600;font-size:18px;">F1 Rezultātu Kalkulators</span>
            </a>
            <nav class="d-none d-md-flex gap-3">
                <a href="#" class="text-decoration-none text-dark">Sākums</a>
                <a href="https://rtk2023.github.io/riki/" class="text-decoration-none text-dark">Rīki</a>
                <a href="https://github.com/rtk2023/riki" target="_blank" rel="noopener"
                    class="text-decoration-none text-dark">GitHub</a>
            </nav>
        </div>
    </header>
    <!--SACENSĪBU TABULA-->
    <div class="container">
        <table id="racesTable" class="table table-striped text-center">
            <thead>
                <tr>
                    <th>Karogs</th>
                    <th>Valsts</th>
                    <th>Sacensības</th>
                    <th>Uzvarētājs</th>
                    <th>Rediģēt</th>
                </tr>
            </thead>
            <tbody id="racesTableBody"></tbody>
        </table>
        <button class="btn btn-secondary" id="btnCurrent" onclick="resetRaces()">Pašreizējie Rezultāti</button>
        <button class="btn btn-primary" id="btnOriginal" onclick="showPointsTable()">Aprēķinātie Rezultāti</button>
    </div>
    <!--PUNKTU TABULA-->
    <div class="container">
        <table id="pointsTable" class="table table-striped text-center">
            <thead>
                <tr>
                    <th>Pozīcija</th>
                    <th>Braucējs</th>
                    <th>Akronīms</th>
                    <th>Vārds</th>
                    <th>Komanda</th>
                    <th>Numurs</th>
                    <th>Punkti</th>
                </tr>
            </thead>
            <tbody id="pointsTableBody"></tbody>
        </table>
    </div>
    <footer class="bg-white align-items-center"><p>2026 &copy; Ričards Bezbailis, Toms Imbrass, Kristaps Priede, RTK</p></footer>
    <script src="modal.js?v=2"></script>
    <script src="script.js?v=2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        </main>
</body>

</html>
