
<!DOCTYPE html>
<html lang="lv">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <title>Ceļojumu Plānotājs / Uzd.6.</title>
</head>
<body>
  
    <header>
        <h1>🌍 Ceļojumu Plānotājs</h1>
        <p>Ievadi savas preferences un mēs ieteiksim piemērotu ceļojuma galamērķi!</p>
    </header>

    
    <main>
        
        <section>
            <h2>Datu ievade:</h2>

            <form id="travel-form">
                <label for="budget">Plānotais budžets (€):</label><br>
                <input type="number" id="budget" name="budget" min="1" max="10000" required placeholder="5000.00 €">

                <label for="duration">Plānotais ceļojuma ilgums (dienās):</label><br>
                <input type="number" id="duration" name="duration" min="1" max = "365" required placeholder="7"><br><br>


                <label>Jūsu intereses?</label><br>
                <input type="checkbox" id="nature" name="interests" value = "daba">
                <label for="nature">Daba</label><br>
                <input type="checkbox" id="city" name="interests" value="pilsēta">
                <label for="city">Pilsēta</label><br>
                
                <input type="checkbox" id="relax" name="interests" value="atpūta">
                <label for="relax">Atpūta</label><br>
                <input type= "checkbox" id="adventure" name="interests"  value = "piedzīvojumi">
                <label for="adventure">Piedzīvojumi</label><br><br>

                <button type="submit">Ģenerēt ieteikumu</button>
            </form>
            
        </section>

        <section id="results">
            
            <h2>Ceļojuma ieteikums:</h2>
            <p id="suggestion">Šeit tiks parādīts ieteiktais galamērķis pēc datu ievades.</p>
        </section>
    </main>

    <footer>
        <p>Autori: P23-2. (9. un 10.)</p>
        <p>&copy; 2026</p>
    </footer>

    
    <script src="script.js"></script>
    
</body>
</html>
