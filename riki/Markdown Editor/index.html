<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <p>Input: </p>
    <textarea id="userInputField" rows="10" cols="50" placeholder="Type your markdown here..." style="resize: none; white-space: pre; overflow-x: auto;"></textarea>
    <p>Output: <span id="display" style="white-space: pre-wrap;"></span></p>
    <input type="file" id="fileInput" accept=".txt,.md">
    <button onclick="downloadFile()">Save File</button>
</body>
</html>
