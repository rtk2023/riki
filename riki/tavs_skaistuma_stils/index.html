<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Nodrošina, ka lapa pareizi attēlojas mobilajās ierīcēs -->
    <title>Tavs Skaistuma Stils | Personalizēta Analīze</title>
    
    <meta name="description" content="Atklāj savu unikālo skaistuma stilu, balstoties uz ādas tipu, acu krāsu un sejas formu. Personalizēti grima un kopšanas ieteikumi.">
    <meta name="keywords" content="skaistums, grims, ādas kopšana, stila analīze, vizāžists">
    <meta name="author" content="Tavs Vārds">
    
    <meta property="og:title" content="Tavs Skaistuma Stils"> <!-- Nosaukums, kas tiek rādīts sociālajos tīklos (Open Graph) -->
    <meta property="og:description" content="Uzzini, kādi produkti un krāsas tev piestāv vislabāk!"> <!-- Apraksts, kas redzams, daloties ar linku -->
    <meta property="og:type" content="website"> <!-- Norāda, ka tas ir mājaslapas tips -->

    <link rel="preconnect" href="https://fonts.googleapis.com"> <!-- Iepriekš izveido savienojumu ar Google Fonts (ātrākai ielādei) -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!-- Papildu savienojums fontu ielādei no cita servera -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Pievieno Bootstrap CSS bibliotēku (gatavi stili un responsīvs dizains) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"> <!-- Pievieno pielāgotus fontus: Playfair Display un Poppins -->

    <style>
        :root {
            --primary-color: #900c3f;
            --accent-color: #e91e63;
            --bg-color: #fffafb;
            --card-bg: #ffffff;
            --text-dark: #2d3436;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#ffe6e6 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            padding-bottom: 50px;
            scroll-behavior: smooth;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--primary-color);
            margin-top: 40px;
            letter-spacing: 1px;
        }

        .progress {
            height: 10px;
            border-radius: 10px;
            background-color: #eee;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, var(--accent-color), var(--primary-color));
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(144, 12, 63, 0.05);
            box-shadow: 0 10px 30px rgba(144, 12, 63, 0.05);
            height: 100%;
            transition: all 0.3s ease;
        }

        .section-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(144, 12, 63, 0.1);
        }

        .btn-choice {
            flex: 1 1 calc(50% - 10px);
            padding: 10px;
            border-radius: 12px;
            background: #fff;
            border: 1.5px solid #f0f0f0;
            transition: all 0.2s;
        }

        .btn-choice:hover { border-color: var(--accent-color); background: #fff5f7; }
        
        .btn-choice.selected {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 4px 12px rgba(144, 12, 63, 0.3);
        }

        /* Statusa ziņojums */
        #status-msg {
            height: 24px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .recommendation-item {
            background: #f8f9fa;
            border-left: 4px solid var(--accent-color);
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 0 10px 10px 0;
            animation: fadeInRight 0.5s ease forwards;
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>

<body>

<main class="container py-5">
    <header class="text-center mb-5">
        <h1>Tavs Skaistuma Stils</h1>
        <h2 class="h5 text-secondary fw-light">Atklāj ideālo makijāžu un kopšanu pēc savām sejas īpašībām</h2>
    </header>

  <section class="row justify-content-center mb-5" aria-label="Progresa josla">
    <h2 class="visually-hidden">Progresa josla</h2>
        <div class="col-md-8 col-lg-6">
            <div class="d-flex justify-content-between mb-2">
                <span class="badge bg-white text-dark border">Izpildes gaita</span>
                <span id="progressText" class="fw-bold">0/6</span>
            </div>
            <div class="progress shadow-sm">
                <div class="progress-bar" id="progressBar" role="progressbar" style="width:0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
        </div>
    </section>

    <div class="row g-4" id="selection-grid">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="section-card" role="group" aria-label="Ādas tips">
                <div class="h6 fw-bold text-uppercase mb-3" style="color: var(--primary-color);">✨ Ādas tips</div>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-choice" data-cat="ĀdasTips" data-val="Sausa">Sausa</button>
                    <button class="btn btn-choice" data-cat="ĀdasTips" data-val="Taukaina">Taukaina</button>
                    <button class="btn btn-choice" data-cat="ĀdasTips" data-val="Kombinēta">Kombinēta</button>
                    <button class="btn btn-choice" data-cat="ĀdasTips" data-val="Normāla">Normāla</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <div class="section-card" role="group" aria-label="Ādas tonis">
                <div class="h6 fw-bold text-uppercase mb-3" style="color: var(--primary-color);">🎨 Ādas tonis</div>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-choice" data-cat="ĀdasTonis" data-val="Gaišs">Gaišs</button>
                    <button class="btn btn-choice" data-cat="ĀdasTonis" data-val="Normāls">Normāls</button>
                    <button class="btn btn-choice" data-cat="ĀdasTonis" data-val="Tumšs">Tumšs</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <div class="section-card" role="group" aria-label="Acu krāsa">
                <div class="h6 fw-bold text-uppercase mb-3" style="color: var(--primary-color);">👁️ Acu krāsa</div>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-choice" data-cat="AcuKrasa" data-val="Zilas">Zilas</button>
                    <button class="btn btn-choice" data-cat="AcuKrasa" data-val="Zaļas">Zaļas</button>
                    <button class="btn btn-choice" data-cat="AcuKrasa" data-val="Brūnas">Brūnas</button>
                    <button class="btn btn-choice" data-cat="AcuKrasa" data-val="Pelēkas">Pelēkas</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <div class="section-card" role="group" aria-label="Matu krāsa">
                <div class="h6 fw-bold text-uppercase mb-3" style="color: var(--primary-color);">💇‍♀️ Matu krāsa</div>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-choice" data-cat="MatuKrasa" data-val="Blondi">Blondi</button>
                    <button class="btn btn-choice" data-cat="MatuKrasa" data-val="Melni">Melni</button>
                    <button class="btn btn-choice" data-cat="MatuKrasa" data-val="Brūni">Brūni</button>
                    <button class="btn btn-choice" data-cat="MatuKrasa" data-val="Krāsaini">Krāsaini</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <div class="section-card" role="group" aria-label="Sejas forma">
                <div class="h6 fw-bold text-uppercase mb-3" style="color: var(--primary-color);">👤 Sejas forma</div>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-choice" data-cat="SejasForma" data-val="Apaļa">Apaļa</button>
                    <button class="btn btn-choice" data-cat="SejasForma" data-val="Ovāla">Ovāla</button>
                    <button class="btn btn-choice" data-cat="SejasForma" data-val="Kvadrātveida">Kvadrātveida</button>
                    <button class="btn btn-choice" data-cat="SejasForma" data-val="Sirds">Sirds</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <div class="section-card" role="group" aria-label="Acu forma">
                <div class="h6 fw-bold text-uppercase mb-3" style="color: var(--primary-color);">👁️ Acu forma</div>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-choice" data-cat="AcuForma" data-val="Mandeļveida">Mandeļveida</button>
                    <button class="btn btn-choice" data-cat="AcuForma" data-val="Apaļas">Apaļas</button>
                    <button class="btn btn-choice" data-cat="AcuForma" data-val="Monolīds">Monolīds</button>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-5">
        <div id="status-msg" class="text-danger fw-bold"></div>
        <button class="btn btn-generate btn-lg shadow px-5 py-3 text-white fw-bold rounded-pill" onclick="generate()" style="background: linear-gradient(135deg, #900c3f, #c70039);">
            Analizēt rezultātus
        </button>
        <div class="mt-4">
            <button class="btn btn-link text-decoration-none text-muted" onclick="randomFill()">🎲 Nejauša izvēle</button>
            <button class="btn btn-link text-decoration-none text-danger" onclick="clearAll()">🗑️ Notīrīt</button>
        </div>
    </div>
</main>

<div class="modal fade" id="modal" tabindex="-1" aria-hidden="true"> <!-- Bootstrap modal logs -->
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 rounded-4 overflow-hidden">
            <div class="modal-header bg-dark text-white border-0 py-3">
                <h3 class="modal-title ms-auto me-auto">Tava Personīgā Skaistuma Karte</h3>
                <button type="button" class="btn-close btn-close-white ms-0" data-bs-dismiss="modal" aria-label="Aizvērt"></button>
            </div>
            <div class="modal-body p-4 p-md-5" id="result"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Pievieno Bootstrap JavaScript funkcionalitāti -->

<script>
    document.addEventListener("DOMContentLoaded", () => {     
        const choices = {};
        const totalSteps = 6;
        const statusMsg = document.getElementById("status-msg");

        // Izvēles loģika
        document.querySelectorAll(".btn-choice").forEach(btn => {
            btn.addEventListener("click", function() {
                const cat = this.dataset.cat;
                const val = this.dataset.val;
                
                choices[cat] = val;
                
                // Vizuālais stāvoklis
                document.querySelectorAll(`[data-cat="${cat}"]`).forEach(b => {
                    b.classList.remove("selected");
                    b.setAttribute("aria-pressed", "false");
                });
                
                this.classList.add("selected");
                this.setAttribute("aria-pressed", "true");
                statusMsg.innerText = ""; // Notīra kļūdu ziņojumu
                
                updateUI();
            });
        });

         // Funkcija, kas atjauno lietotāja interfeisu (UI)
        function updateUI()  {
            const done = Object.keys(choices).length;
            const percent = (done / totalSteps) * 100;
            document.getElementById("progressText").innerText = `${done}/${totalSteps}`;
            const bar = document.getElementById("progressBar");
            bar.style.width = percent + "%";
            bar.setAttribute("aria-valuenow", percent);
        }

        // Izveido globālu funkciju "generate", ko var izsaukt no jebkuras vietas
        window.generate = () => {
            if (Object.keys(choices).length < totalSteps) {
                statusMsg.innerText = "⚠️ Lūdzu, aizpildi visas sekcijas!";
                return;
            }
            
            const resultDiv = document.getElementById("result");
            const logicData = analyzeLogic(choices);
            
            resultDiv.innerHTML = renderResult(logicData, choices);
            const modal = new bootstrap.Modal(document.getElementById('modal'));
            modal.show();
        };


        // Funkcija, kas analizē lietotāja izvēles un nosaka stilu
        function analyzeLogic(c) {
            let style = "Dabīgs un elegants tēls";
            let confidence = 92;

            if (c.ĀdasTips === "Taukaina" && c.AcuKrasa === "Brūnas") style = "Dramatisks vakara glamūrs";
            else if (c.ĀdasTips === "Sausa") style = "Esterisks 'Dewy' mirdzums";
            else if (c.SejasForma === "Apaļa") style = "Skulpturēts kontūru stils";

            return { style, confidence };
        }

        // Funkcija, kas ģenerē rezultāta HTML (ko parāda lietotājam) 
        function renderResult(data, c) {
            return `
                <div class="text-center mb-4">
                    <div class="badge rounded-pill px-4 py-2 mb-2" style="background: #fff0f3; color: var(--primary-color); font-size: 1rem;">${data.style}</div>
                    <p class="text-muted small">Algoritma saderība: ${data.confidence}%</p>
                </div>
                <div class="row g-4">
                    <div class="col-md-7">
                        <h6 class="fw-bold mb-3"><i class="me-2">💄</i>Eksperta ieteikumi:</h6>
                        <div class="recommendation-item"><strong>Ādai:</strong> ${c.ĀdasTips === 'Sausa' ? 'Izmanto krēmveida tekstūras.' : 'Lieto matējošus praimerus.'}</div>
                        <div class="recommendation-item"><strong>Acīm:</strong> Izcel savas ${c.AcuKrasa.toLowerCase()} acis ar kontrastējošām ēnu gammām.</div>
                        <div class="recommendation-item"><strong>Formai:</strong> Izmanto gaismu atstarojošu pūderi, lai akcentētu ${c.SejasForma.toLowerCase()} formu.</div>
                    </div>
                    <div class="col-md-5">
                        <div class="p-3 rounded-4" style="background: #fdf2f5; border: 1px dashed var(--accent-color);">
                            <h6 class="fw-bold mb-2 small text-uppercase">Kāpēc tas Tev piestāv?</h6>
                            <p class="small mb-0">Tava unikālā ${c.MatuKrasa.toLowerCase()} matu un ${c.AcuKrasa.toLowerCase()} acu kombinācija prasa specifisku krāsu temperatūru, ko šis stils nodrošina.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // Izveido globālu funkciju, kas aizpilda izvēles nejauši
        window.randomFill = () => {
            const cats = ["ĀdasTips", "ĀdasTonis", "AcuKrasa", "MatuKrasa", "SejasForma", "AcuForma"];
            cats.forEach(cat => {
                const btns = document.querySelectorAll(`[data-cat="${cat}"]`);
                btns[Math.floor(Math.random() * btns.length)].click();
            });
        };

        // Izveido globālu funkciju, kas notīra visas lietotāja izvēles
        window.clearAll = () => {
            for (let k in choices) delete choices[k];
            document.querySelectorAll(".btn-choice").forEach(b => b.classList.remove("selected"));
            updateUI();
        };
    });
</script>

</body>
</html>
