<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ūdens Challenge</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
    <h1>💧 Ūdens Challenge</h1>

    <div class="glass">
        <div class="water" id="water"></div>
        <div class="percent" id="percent">0%</div>
    </div>

    <div class="amount">
        <span id="total">0</span> / <span id="goalDisplay">2000</span> ml
    </div>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <select id="mode">
        <option value="none">🎯 Bez challenge</option>
        <option value="day">☀️ 1 diena</option>
        <option value="week">📅 7 dienas</option>
    </select>

    <input type="number" id="glassSize" placeholder="Glāze (max 350ml)">
    <input type="number" id="goal" placeholder="Mērķis (ml)">

    <button class="big-btn" onclick="addWater()">💧 Pievienot Glāzi</button>
    <button onclick="startChallenge()">🚀 Start</button>
    <button onclick="saveGoal()">💾 Saglabāt</button>
    <button onclick="resetLock()">🔓 Unlock</button>
    <button onclick="resetDay()">🔄 Reset</button>

    <div class="stats">
        <div class="stat">
            <b id="streak">0</b>
            <span>🔥 Sērija</span>
        </div>
        <div class="stat">
            <b id="glasses">0</b>
            <span>🥤 Glāzes</span>
        </div>
        <div class="stat">
            <b id="record">0</b>
            <span>🏆 Rekords</span>
        </div>
    </div>

    <div class="msg" id="msg">Sāc dzert ūdeni! 💧</div>

    <div class="badges">
        🏅 <b>Sasniegumi:</b><br>
        <div id="achievements" style="margin-top: 6px;">nav vēl</div>
    </div>

    <a href="https://rtk2023.github.io/riki/" target="_blank">
        Atvērt saiti uz rīkiem
    </a>
</div>

<script src="script.js"></script>
</body>
</html>
